name: Build & Publish Docker Image

on:
  repository_dispatch:
    types: [controller-updated]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout controller source
        uses: actions/checkout@v4
        with:
          repository: powerguardianOS/powerguardian-controller
          token: ${{ secrets.CONTROLLER_TOKEN }}
          ref: ${{ github.event.client_payload.sha || 'master' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./controller
          platforms: linux/arm/v7,linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/powerguardianos/powerguardian-controller-docker:latest
            ghcr.io/powerguardianos/powerguardian-controller-docker:${{ github.event.client_payload.sha || github.sha }}
          build-args: |
            VERSION=${{ github.event.client_payload.sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
