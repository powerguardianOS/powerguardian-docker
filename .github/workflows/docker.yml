name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout controller source
        uses: actions/checkout@v4
        with:
          repository: powerguardianOS/powerguardian-controller
          token: ${{ secrets.CONTROLLER_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CONTROLLER_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./controller
          platforms: linux/arm/v7,linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/powerguardianos/powerguardian-controller:latest
            ghcr.io/powerguardianos/powerguardian-controller:${{ github.sha }}
