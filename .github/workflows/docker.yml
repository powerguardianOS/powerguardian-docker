name: Build & Push Docker Image

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [controller-updated]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout controller source
        uses: actions/checkout@v4
        with:
          repository: powerguardianOS/powerguardian-controller
          token: ${{ secrets.CONTROLLER_TOKEN }}
          ref: master

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CONTROLLER_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./controller
          platforms: linux/arm/v7,linux/arm64,linux/amd64
          push: true
          labels: |
            org.opencontainers.image.source=https://github.com/powerguardianOS/powerguardian-docker
            org.opencontainers.image.title=PowerGuardian Docker
            org.opencontainers.image.description=PowerGuardian Controller — UPS monitoring for Docker
          tags: |
            ghcr.io/powerguardianos/powerguardian-docker:latest
            ghcr.io/powerguardianos/powerguardian-docker:${{ github.event.client_payload.sha || github.sha }}
